<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список дел</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Основной блок на всю страницу */
        .todo-page {
            width: 100%;
            max-width: 700px;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        /* Заголовок */
        h1 {
            font-size: 36px;
            font-weight: bold;
            margin: 0 0 20px 0;
            color: #333;
        }

        /* Форма */
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .form-row input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .form-row button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }

        .form-row button:first-of-type {
            background-color: #4a90e2;
            color: white;
        }

        .form-row button:last-of-type {
            background-color: #e74c3c;
            color: white;
        }

        /* Список дел */
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            margin-bottom: 10px;
            background-color: #e8f5e9;  /* Светло-зелёный фон */
            border-radius: 8px;
        }

        .todo-checkbox {
            margin-right: 15px;
        }

        .todo-checkbox input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todo-content {
            flex: 1;
        }

        .todo-title {
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }

        .todo-date {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .todo-delete {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            padding: 0 5px;
        }

        .todo-delete:hover {
            color: #e74c3c;
        }

        /* Футер */
        footer {
            margin-top: auto;
            border-top: 2px solid #4a90e2;  /* Синяя линия */
            padding-top: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
            }
            
            .form-row input,
            .form-row button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="todo-page">
        <!-- Заголовок сверху -->
        <h1>Список дел</h1>

        <!-- Форма (поле + две кнопки) -->
        <div class="form-row">
            <input type="text" placeholder="Новый элемент списка" value="Новый элемент списка">
            <button>Создать</button>
            <button>Очистить всё</button>
        </div>

        <!-- Список дел -->
        <ul class="todo-list">
            <li class="todo-item">
                <div class="todo-checkbox">
                    <input type="checkbox" checked>
                </div>
                <div class="todo-content">
                    <div class="todo-title">Почесать кошку</div>
                    <div class="todo-date">от 14.08.2023</div>
                </div>
                <button class="todo-delete">✖</button>
            </li>
            <li class="todo-item">
                <div class="todo-checkbox">
                    <input type="checkbox" checked>
                </div>
                <div class="todo-content">
                    <div class="todo-title">Полить картошку</div>
                    <div class="todo-date">от 04.05.2022</div>
                </div>
                <button class="todo-delete">✖</button>
            </li>
            <li class="todo-item">
                <div class="todo-checkbox">
                    <input type="checkbox" checked>
                </div>
                <div class="todo-content">
                    <div class="todo-title">Сложить в лукошко</div>
                    <div class="todo-date">от 19.05.2022</div>
                </div>
                <button class="todo-delete">✖</button>
            </li>
        </ul>

        <!-- Футер с линией -->
        <footer>
            Copyright ©
        </footer>
    </div>
</body>
</html>
